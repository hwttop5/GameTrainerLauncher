name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "Docs/site/**"
      - ".github/workflows/pages-site.yml"
      - "README.md"
      - "README.en.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare website publish directory
        shell: bash
        run: |
          rm -rf public
          mkdir -p public/Docs/Images
          cp -R Docs/site/. public/
          cp Docs/Images/demo.gif public/Docs/Images/demo.gif

      - name: Deploy site root to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: .
          keep_files: true
